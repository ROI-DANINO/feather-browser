name: CI

# Verification gate for Feather Browser. Mirrors the local "full verification pass":
# typecheck + build + unit + integration (real Chromium). Measurement tests are
# intentionally excluded — their timings are resource-sensitive and flaky on shared runners.
on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      # Integration tests drive Playwright's bundled Chromium. The system-Chromium
      # probe self-skips when /usr/bin/chromium-browser is absent (as it is here).
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Integration tests
        run: npm run test:integration
