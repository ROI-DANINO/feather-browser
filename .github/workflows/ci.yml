name: CI

# Verification gate for Feather Browser. Mirrors the local "full verification pass":
# typecheck + build + unit + integration (real Chromium). Measurement tests are
# intentionally excluded — their timings are resource-sensitive and flaky on shared runners.
on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      # Integration tests drive Playwright's bundled Chromium. The system-Chromium
      # probe self-skips when /usr/bin/chromium-browser is absent (as it is here).
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # The headed CDP-attach test (attach-cdp) needs a display. Xvfb gives a real
      # headed surface (more faithful for anti-detection than --headless), and
      # spawnAndConnect now omits --ozone-platform when WAYLAND_DISPLAY is unset so
      # Chromium auto-picks X11 under Xvfb. (FEATHER_SPAWN_HEADLESS stays unset; it's
      # the documented fallback only if Xvfb proves flaky.)
      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Integration tests (under Xvfb)
        run: xvfb-run -a npm run test:integration
