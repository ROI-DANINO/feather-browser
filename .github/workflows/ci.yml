name: CI

# Verification gate for Feather Browser. Mirrors the local "full verification pass":
# typecheck + build + unit + integration (real Chromium). Measurement tests are
# intentionally excluded — their timings are resource-sensitive and flaky on shared runners.
on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      # Integration tests drive Playwright's bundled Chromium. The system-Chromium
      # probe self-skips when /usr/bin/chromium-browser is absent (as it is here).
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # The headed CDP-attach tests (attach-cdp, system-chromium) need a display. On a display-less
      # runner we attach over CDP to `--headless=new` Chromium: the assertions these tests make
      # (navigator.webdriver === false; system-build version) are identical headless vs headed, since
      # webdriver is set by --disable-blink-features=AutomationControlled + the CDP attach, not by
      # headedness. The headed-vs-headless *fingerprint* fidelity (WebGL renderer, etc.) is measured
      # separately on a real display (anti-detection self-test), not here.
      # --no-sandbox: CI containers can't init Chromium's user-namespace sandbox, so the raw
      # spawnAndConnect Chromium aborts ("exited with code null") before exposing CDP without it.
      # Neither flag is JS-observable; both are off by default everywhere outside CI.
      - name: Integration tests
        env:
          FEATHER_SPAWN_HEADLESS: "1"
          FEATHER_SPAWN_NO_SANDBOX: "1"
        run: npm run test:integration
